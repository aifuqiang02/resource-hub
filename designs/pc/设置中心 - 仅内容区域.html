<!DOCTYPE html>

<button class="px-6 py-2 bg-primary text-white text-sm font-bold rounded-lg hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20">修改密码</button>

<div class="bg-primary/5 dark:bg-primary/10 border border-primary/10 rounded-xl p-6 flex flex-col items-center text-center">
